<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
  <div class="calculator">
    <h1>Calculator</h1>
    <div id="res" class="result">0</div>

    <div class="buttons">
      <button class="action" onclick="main('erase')">C</button>
      <button onclick="main('/')">÷</button>
      <button onclick="main('*')">×</button>
      <button onclick="main('backspace')">⌫</button>

      <button onclick="main('7')">7</button>
      <button onclick="main('8')">8</button>
      <button onclick="main('9')">9</button>
      <button onclick="main('-')">−</button>

      <button onclick="main('4')">4</button>
      <button onclick="main('5')">5</button>
      <button onclick="main('6')">6</button>
      <button onclick="main('+')">+</button>

      <button onclick="main('1')">1</button>
      <button onclick="main('2')">2</button>
      <button onclick="main('3')">3</button>
      <button class="equal" onclick="main('enter')">=</button>

      <button class="zero" onclick="main('0')">0</button>
      <button onclick="main('.')">.</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
